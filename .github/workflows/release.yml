name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # A PAT, not the default GITHUB_TOKEN: pull requests opened by
          # GITHUB_TOKEN do not trigger other workflows, so the release PR
          # would never get validated. Needs Contents and Pull requests
          # read/write on this repo. Falls back to GITHUB_TOKEN, which works
          # only if "Allow GitHub Actions to create and approve pull requests"
          # is enabled in the repository's Actions settings.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
